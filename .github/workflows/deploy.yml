name: Deploy JMG Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /var/www/jmg-dashboard
            git pull origin main
            npm install
            npm run build
            pm2 restart jmg-dashboard
            sleep 3
            curl -sf http://127.0.0.1:3001/api/mix-webhook/health || echo "Webhook health check failed — check pm2 logs"
